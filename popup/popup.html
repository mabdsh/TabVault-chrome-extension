<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>TabVault</title>
  <link rel="stylesheet" href="../shared/shared.css" />
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="popup">

    <!-- ── Header ─────────────────────────────────────────── -->
    <header class="popup-header">
      <div class="brand">
        <div class="brand-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="6" width="18" height="13" rx="2.5"/>
            <path d="M3 10h18M8 6V4M16 6V4"/>
          </svg>
        </div>
        <span class="brand-name">TabVault</span>
      </div>
      <div class="header-actions">
        <button id="openSidebarBtn" class="btn btn-open-sidebar" title="Open the full TabVault sidebar panel" aria-label="Open sidebar">
          <svg class="icon" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 3v18"/><path d="M14 9l3 3-3 3"/></svg>
          <span>Full view</span>
        </button>
        <button id="optionsBtn" class="btn btn-icon btn-ghost" title="Open settings" aria-label="Settings">
          <svg class="icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
        </button>
      </div>
    </header>

    <!-- ── Search ──────────────────────────────────────────── -->
    <div class="popup-search">
      <svg class="search-icon icon" viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
      <input id="popupSearch" type="text" placeholder="Search tabs, bookmarks, history…" autocomplete="off" />
    </div>

    <!-- ── Nav tabs ────────────────────────────────────────── -->
    <nav class="popup-nav" role="tablist" aria-label="Views">
      <button class="nav-pill active" data-view="tabs" role="tab" aria-label="Tabs">
        Tabs <span class="pill-count" id="pillTabs">0</span>
      </button>
      <button class="nav-pill" data-view="sessions" role="tab" aria-label="Sessions">
        Sessions <span class="pill-count" id="pillSessions">0</span>
      </button>
      <button class="nav-pill" data-view="bookmarks" role="tab" aria-label="Bookmarks">
        Bookmarks
      </button>
      <button class="nav-pill" data-view="reading" role="tab" aria-label="Reading List">
        Reading <span class="pill-count" id="pillReading" hidden>0</span>
      </button>
    </nav>

    <!-- ── Quick actions ───────────────────────────────────── -->
    <div class="quick-actions" role="toolbar" aria-label="Quick actions">
      <button class="qa-btn" id="saveSessionBtn"
        title="Save all open tabs in this window as a named session — restore them later from the Sessions tab">
        <svg class="icon" viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
        Save session
      </button>
      <button class="qa-btn" id="autoGroupBtn"
        title="Automatically group tabs that share the same domain into Chrome tab groups">
        <svg class="icon" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        Auto-group
      </button>
      <button class="qa-btn" id="readLaterBtn"
        title="Save the current tab to your Reading List to read later">
        <svg class="icon" viewBox="0 0 24 24"><path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2z"/><path d="M22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z"/></svg>
        Read later
      </button>
      <button class="qa-btn" id="closeDupsBtn"
        title="Find and close duplicate tabs — keeps the first one open">
        <svg class="icon" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
        Close dupes
        <span class="qa-badge" id="dupBadge" hidden>0</span>
      </button>
    </div>

    <!-- ── Body ────────────────────────────────────────────── -->
    <main class="popup-body" id="popupBody" role="main"></main>

    <!-- ── Footer ──────────────────────────────────────────── -->
    <footer class="popup-footer" id="popupFooter" aria-label="Stats"></footer>

  </div>

  <script src="../shared/lib/fuse_min.js"></script>
  <script type="module" src="popup.js"></script>
</body>
</html>
