<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>TabVault</title>
  <link rel="stylesheet" href="../shared/shared.css" />
  <link rel="stylesheet" href="sidebar.css" />
</head>
<body>
  <div class="app">

    <!-- ── Top bar ─────────────────────────────────────────── -->
    <header class="topbar">
      <div class="brand">
        <div class="brand-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="6" width="18" height="13" rx="2.5"/>
            <path d="M3 10h18M8 6V4M16 6V4"/>
          </svg>
        </div>
        <span class="brand-name">TabVault</span>
      </div>

      <div class="search-wrap">
        <svg class="icon search-icon" viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
        <input id="globalSearch" type="text" placeholder="Search tabs, bookmarks, history…" autocomplete="off" />
        <kbd class="search-kbd">⌘K</kbd>
      </div>

      <button id="settingsBtn" class="btn btn-icon btn-ghost" aria-label="Settings" title="Settings">
        <svg class="icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
      </button>
    </header>

    <!-- ── Body: nav rail + content ─────────────────────────── -->
    <div class="app-body">

      <!-- Vertical nav rail -->
      <nav class="sidebar-nav" role="tablist" aria-label="Main navigation">

        <!-- Primary views -->
        <div class="nav-group">
          <button class="nav-item active" data-view="tabs" role="tab" aria-label="Tabs">
            <span class="nav-icon-wrap">
              <svg class="icon" viewBox="0 0 24 24"><rect x="3" y="6" width="18" height="13" rx="2"/><path d="M3 10h18M8 6V4M16 6V4"/></svg>
              <span class="nav-badge" id="navTabCount">0</span>
            </span>
            <span class="nav-label">Tabs</span>
          </button>
          <button class="nav-item" data-view="sessions" role="tab" aria-label="Sessions">
            <span class="nav-icon-wrap">
              <svg class="icon" viewBox="0 0 24 24"><path d="M21 12a9 9 0 11-3-6.7"/><path d="M21 4v5h-5"/></svg>
              <span class="nav-badge" id="navSessionCount">0</span>
            </span>
            <span class="nav-label">Sessions</span>
          </button>
          <button class="nav-item" data-view="bookmarks" role="tab" aria-label="Bookmarks">
            <span class="nav-icon-wrap">
              <svg class="icon" viewBox="0 0 24 24"><path d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2z"/></svg>
            </span>
            <span class="nav-label">Bookmarks</span>
          </button>
          <button class="nav-item" data-view="reading" role="tab" aria-label="Reading List">
            <span class="nav-icon-wrap">
              <svg class="icon" viewBox="0 0 24 24"><path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2z"/><path d="M22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z"/></svg>
              <span class="nav-badge" id="navReadingCount" hidden>0</span>
            </span>
            <span class="nav-label">Reading</span>
          </button>
          <button class="nav-item" data-view="workspaces" role="tab" aria-label="Workspaces">
            <span class="nav-icon-wrap">
              <svg class="icon" viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
              <span class="nav-badge" id="navWsCount" hidden>0</span>
            </span>
            <span class="nav-label">Workspaces</span>
          </button>
        </div>

        <!-- Divider -->
        <div class="nav-divider" role="separator"></div>

        <!-- Tools / analysis views -->
        <div class="nav-group">
          <button class="nav-item" data-view="tags" role="tab" aria-label="Tags">
            <span class="nav-icon-wrap">
              <svg class="icon" viewBox="0 0 24 24"><path d="M20.6 13.4L13 21l-9-9V4h8z"/><circle cx="7.5" cy="7.5" r="1.5"/></svg>
            </span>
            <span class="nav-label">Tags</span>
          </button>
          <button class="nav-item" data-view="duplicates" role="tab" aria-label="Duplicate tabs">
            <span class="nav-icon-wrap">
              <svg class="icon" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
              <span class="nav-badge danger" id="navDupCount" hidden>0</span>
            </span>
            <span class="nav-label">Duplicates</span>
          </button>
          <button class="nav-item" data-view="broken" role="tab" aria-label="Broken links">
            <span class="nav-icon-wrap">
              <svg class="icon" viewBox="0 0 24 24"><path d="M10 13a5 5 0 007 0l3-3a5 5 0 00-7-7l-1 1"/><path d="M14 11a5 5 0 00-7 0l-3 3a5 5 0 007 7l1-1"/></svg>
            </span>
            <span class="nav-label">Broken</span>
          </button>
          <button class="nav-item" data-view="insights" role="tab" aria-label="Insights">
            <span class="nav-icon-wrap">
              <svg class="icon" viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
            </span>
            <span class="nav-label">Insights</span>
          </button>
        </div>

      </nav>

      <!-- Main content area -->
      <main id="main" class="main"></main>

    </div>
  </div>

  <script src="../shared/lib/fuse_min.js"></script>
  <script type="module" src="sidebar.js"></script>
</body>
</html>
